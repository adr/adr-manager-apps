name: Extension · Publish

# Publishes the VS Code extension to the Marketplace via vsce. Triggered
# manually (workflow_dispatch) to avoid accidental Marketplace publishes
# run it after the "Version Packages" PR has bumped the extension's version.
# Requires the VSCE_PAT secret, an Azure DevOps token from an account that is
# a member of the adr-org publisher. Azure DevOps PATs retire on 2026-12-01,
# until CI auth is migrated to Entra ID the extension can also be published
# locally with "vsce publish --azure-credential" after "az login".

on:
  workflow_dispatch:

jobs:
  publish:
    name: vsce publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.21.0"
      - uses: pnpm/action-setup@v6
        with:
          cache: true
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter vscode-adr-manager exec vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
