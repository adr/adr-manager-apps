name: Web · Tests

on:
  push:
    paths:
      - "apps/adr-manager/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/web-tests.yml"
  workflow_dispatch:

concurrency:
  group: web-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Vitest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - uses: pnpm/action-setup@v6
        with:
          cache: true
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter adr-manager test

  e2e-tests:
    name: Cypress e2e (Chrome)
    runs-on: ubuntu-latest
    # Image Node version should match .nvmrc, update both together
    container: cypress/browsers:node-22.19.0-chrome-140.0.7339.207-1-ff-143.0.1-edge-140.0.3485.81-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - uses: pnpm/action-setup@v6
        with:
          cache: true
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter adr-manager exec cypress verify
      - name: Run Cypress
        env:
          CYPRESS_OAUTH_E2E_AUTH_ID: ${{ secrets.OAUTH_E2E_AUTH_ID }}
          CYPRESS_USER: ${{ secrets.USER }}
        run: |
          pnpm --filter adr-manager start &
          pnpm --filter adr-manager e2e:test-ci
