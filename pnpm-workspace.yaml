packages:
  - "apps/*"
  - "packages/*"

nodeLinker: hoisted
minimumReleaseAge: 7200
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 525600
trustPolicyExclude:
  - rollup

allowBuilds:
  "@parcel/watcher": false
  "@vscode/vsce-sign": false
  cypress: true
  core-js: true
  esbuild: true
  keytar: false
  protobufjs: false
  vue-demi: false
  # Postinstall only bakes FIREBASE_WEBAPP_CONFIG autoinit config; we pass config explicitly.
  "@firebase/util": false

# Single source of truth for dependency versions shared across packages.
# Reference these from a package.json with the "catalog:" protocol.
catalog:
  # Pinned exactly so every package builds against the identical compiler/runtime.
  typescript: 6.0.3
  vue: 3.5.35
  # Shared tooling (caret ranges; pnpm resolves the newest installable).
  "@types/node": ^22.19.19
  sass: ^1.100.0
  antlr4: ^4.13.2
  prettier: ^3.8.3
  concurrently: ^10.0.3
  # Build toolchain (Vite for browser bundles, esbuild for the extension host).
  vite: ^8.0.16
  "@vitejs/plugin-vue": ^6.0.7
  esbuild: ^0.28.0
  # ESLint stack (flat config, shared by @adr-manager/eslint-config).
  eslint: ^10.4.1
  typescript-eslint: ^8.60.1
  "@eslint/js": ^10.0.1
  eslint-plugin-vue: ^10.9.2
  vue-eslint-parser: ^10.4.1
  globals: ^17.6.0
  eslint-config-prettier: ^10.1.8
  # Test runner (all packages).
  vitest: ^4.1.8
  # Type-checks .vue SFCs (web app and extension webviews).
  vue-tsc: ^3.3.3
